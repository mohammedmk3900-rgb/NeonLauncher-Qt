name: Stable Multi-Platform Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Install Qt6 (6.5.3)
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.5.3'

    - name: Clean Workspace and Configure CMake
      run: |
        rm -rf build
        cmake -B build -DCMAKE_BUILD_TYPE=Release
    
    - name: Build
      run: cmake --build build --config Release

    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NeonLauncher-Linux
        path: build/NeonLauncherApp*

  build-windows:
    runs-on: windows-2019

    steps:
    - uses: actions/checkout@v4
    
    - name: Install Qt6 (6.5.3 MSVC)
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.5.3'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
    
    - name: Configure with CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"
    
    - name: Build
      run: cmake --build build --config Release

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NeonLauncher-Windows
        path: build/Release/
