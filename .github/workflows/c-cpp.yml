name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y qt6-base-dev cmake build-essential
    
    - name: Configure with CMake
      run: cmake -B build
    
    - name: Build
      run: cmake --build build
    
    - name: Tests
      run: ctest --test-dir build --verbose
