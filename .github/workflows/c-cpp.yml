name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Install Qt6 dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          qt6-base-dev \
          qt6-qml-dev \
          qt6-quick-dev \
          qt6-sql-dev \
          cmake \
          build-essential
    
    - name: Configure with CMake
      run: cmake -B build
    
    - name: Build
      run: cmake --build build
    
    - name: Tests
      run: ctest --test-dir build --verbose || true
