name: Stable Multi-Platform Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'

      - name: Install Dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev libpulse-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: cmake --build build --config Release

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          arch: 'msvc2019_64'

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: cmake --build build --config Release
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install aqtinstall stable
        run: |
          python -m pip install --upgrade pip
          pip install "aqtinstall<3.2"

      - name: Install Qt
        run: |
          python -m aqt install-qt windows desktop 6.5.3 msvc2019_64 -O D:\a\NeonLauncher-Qt/Qt

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="D:/a/NeonLauncher-Qt/Qt/6.5.3/msvc2019_64"

      - name: Build Project
        run: cmake --build build --config Release
